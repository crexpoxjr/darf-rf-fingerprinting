dataset:
  name: oracle
  path: src/datasets/ORACLE/dataset1/neu_m044q5210
  window_length: 256
  channels: 2
  max_classes: 16
  max_windows_per_recording: 512
  output_dtype: float64
  normalize: true
  split:
    protocol: grouped_by_source_file
    train: 0.7
    val: 0.1
    test: 0.2
  batch_size: 32
  seed: 42

model:
  name: cnn1d
  classes: 16

training:
  learning_rate: 0.003
  epochs: 40
  output_dir: results/oracle_cnn
